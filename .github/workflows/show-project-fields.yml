name: Show Project Fields

on:
  workflow_dispatch:

jobs:
  list-fields:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      project-beta: read

    steps:
      - name: Show project fields
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const org = "codeit-fe16-part2-team2";  // ← 조직 이름 수정
            const projectNumber = 1;                // ← 프로젝트 번호 수정

            const query = `
              query($login: String!, $number: Int!) {
                organization(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2FieldCommon {
                          id
                          name
                          dataType
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              login: org,
              number: projectNumber,
            });

            console.log("✅ 프로젝트 필드 목록:");
            console.log(JSON.stringify(result.organization.projectV2.fields.nodes, null, 2));

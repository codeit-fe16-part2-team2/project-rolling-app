name: Move issue to Done in Projects v2

on:
  issues:
    types: [closed]

jobs:
  move-to-done:
    runs-on: ubuntu-latest
    steps:
      - name: Update Project v2 issue status to Done
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNodeId = context.payload.issue.node_id;
            const projectNumber = 1;
            const org = "codeit-fe16-part2-team2";

            const { organization } = await github.graphql(`
              query ($org: String!, $projectNumber: Int!) {
                organization(login: $org) {
                  projectV2(number: $projectNumber) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, projectNumber });

            const project = organization.projectV2;
            if (!project) {
              console.log("❌ Project not found.");
              return;
            }

            const item = project.items.nodes.find(i => i.content?.id === issueNodeId);
            if (!item) {
              console.log("❌ Issue not part of project.");
              return;
            }

            const statusField = project.fields.nodes.find(f => f.name === "Status");
            if (!statusField) {
              console.log("❌ Status field not found.");
              return;
            }

            const doneOption = statusField.options.find(opt => opt.name === "Done");
            if (!doneOption) {
              console.log("❌ Done option not found.");
              return;
            }

            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${project.id}",
                  itemId: "${item.id}",
                  fieldId: "${statusField.id}",
                  value: {
                    singleSelectOptionId: "${doneOption.id}"
                  }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `);

            console.log(`✅ Issue #${context.payload.issue.number} moved to Done in project.`);

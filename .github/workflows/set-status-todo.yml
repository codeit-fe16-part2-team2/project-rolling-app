name: Add new issue to Project v2 with Status = Todo

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to Project v2 and set Status
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNodeId = context.payload.issue.node_id;
            const org = "codeit-fe16-part2-team2";
            const projectNumber = 1;

            // 1. Get Project info, Status field, and "Todo" option
            const { organization } = await github.graphql(`
              query ($org: String!, $projectNumber: Int!) {
                organization(login: $org) {
                  projectV2(number: $projectNumber) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { org, projectNumber });

            const project = organization.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === "Status");
            const todoOption = statusField?.options.find(opt => opt.name === "Todo");
            if (!statusField || !todoOption) return;

            // 2. Add the issue to the project
            const addResult = await github.graphql(`
              mutation {
                addProjectV2ItemById(input: {
                  projectId: "${project.id}",
                  contentId: "${issueNodeId}"
                }) {
                  item {
                    id
                  }
                }
              }
            `);

            const itemId = addResult.addProjectV2ItemById.item.id;

            // 3. Set Status = Todo
            await github.graphql(`
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${project.id}",
                  itemId: "${itemId}",
                  fieldId: "${statusField.id}",
                  value: {
                    singleSelectOptionId: "${todoOption.id}"
                  }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `);

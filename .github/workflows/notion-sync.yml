name: Issue → Notion 날짜 동기화

on:
  issues:
    types: [opened]

jobs:
  send-to-notion:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

    steps:
      - name: Send issue info to Notion
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const createdDate = new Date(issue.created_at).toISOString().split('T')[0];

            const targetMatch = issue.body.match(/Target[^\n]*\n+(\d{4}-\d{2}-\d{2})/);
            const targetDate = targetMatch ? targetMatch[1] : createdDate;

            const res = await fetch("https://api.notion.com/v1/pages", {
              method: "POST",
              headers: {
                "Authorization": `Bearer ${process.env.NOTION_TOKEN}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                parent: { database_id: process.env.NOTION_DATABASE_ID },
                properties: {
                  Name: {
                    title: [
                      {
                        text: {
                          content: issue.title
                        }
                      }
                    ]
                  },
                  Date: {
                    date: {
                      start: createdDate,
                      end: targetDate
                    }
                  }
                }
              })
            });

            if (!res.ok) {
              const errorText = await res.text();
              throw new Error(`❌ Notion API 요청 실패: ${res.status} ${errorText}`);
            } else {
              console.log(`✅ Notion에 등록 완료: ${issue.title}`);
            }

name: Issue → Notion Sync

on:
  issues:
    types: [opened, labeled, unlabeled]
  pull_request:
    types: [closed]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

    steps:
      - name: Sync GitHub Issue to Notion
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;

            const createdDate = new Date(issue.created_at).toISOString().split('T')[0];

            // ✅ Extract Target Date from Issue Template (based on label header)
            const targetMatch = issue.body.match(/⏰ Target 날짜[\s\S]*?\n+(\d{4}-\d{2}-\d{2})/);
            const targetDate = targetMatch ? targetMatch[1] : createdDate;

            // ✅ Extract milestone title if exists
            const milestone = issue.milestone ? issue.milestone.title : null;

            const notionHeaders = {
              "Authorization": `Bearer ${process.env.NOTION_TOKEN}`,
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json"
            };

            // ✅ Handle issue creation
            if (action === "opened") {
              const notionBody = {
                parent: { database_id: process.env.NOTION_DATABASE_ID },
                properties: {
                  Name: {
                    title: [
                      {
                        text: {
                          content: issue.title
                        }
                      }
                    ]
                  },
                  Date: {
                    date: {
                      start: createdDate,
                      end: targetDate
                    }
                  },
                  Status: {
                    select: {
                      name: "Todo"
                    }
                  },
                  URL: {
                    url: issue.html_url
                  }
                }
              };

              // ✅ Add Milestone if exists
              if (milestone) {
                notionBody.properties.Milestone = {
                  rich_text: [
                    {
                      text: {
                        content: milestone
                      }
                    }
                  ]
                };
              }

              const res = await fetch("https://api.notion.com/v1/pages", {
                method: "POST",
                headers: notionHeaders,
                body: JSON.stringify(notionBody)
              });

              if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`❌ Notion 등록 실패: ${res.status} ${errorText}`);
              } else {
                console.log(`✅ Notion에 등록 완료: ${issue.title}`);
              }
            }

            // ✅ Handle label updates → sync to Notion Status
            if (action === "labeled" || action === "unlabeled") {
              const label = context.payload.label.name;
              const allowedStatuses = ["Todo", "In Progress", "Done"];
              if (allowedStatuses.includes(label)) {
                const notionSearch = await fetch("https://api.notion.com/v1/databases/" + process.env.NOTION_DATABASE_ID + "/query", {
                  method: "POST",
                  headers: notionHeaders,
                  body: JSON.stringify({
                    filter: {
                      property: "Name",
                      title: {
                        equals: issue.title
                      }
                    }
                  })
                });

                const notionResult = await notionSearch.json();
                if (notionResult.results.length > 0) {
                  const pageId = notionResult.results[0].id;

                  const updateRes = await fetch("https://api.notion.com/v1/pages/" + pageId, {
                    method: "PATCH",
                    headers: notionHeaders,
                    body: JSON.stringify({
                      properties: {
                        Status: {
                          select: {
                            name: label
                          }
                        }
                      }
                    })
                  });

                  if (!updateRes.ok) {
                    const errorText = await updateRes.text();
                    throw new Error(`❌ Status 업데이트 실패: ${updateRes.status} ${errorText}`);
                  } else {
                    console.log(`✅ Notion Status 업데이트 완료: ${label}`);
                  }
                }
              }
            }

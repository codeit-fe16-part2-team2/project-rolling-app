name: Sync Due Date to Project

on:
  issues:
    types: [milestoned, edited]

jobs:
  sync-date:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
      actions: read
      pull-requests: read
    steps:
      - name: Sync milestone due date to project Target field
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            const issue_number = context.issue.number;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const dueDate = issue.milestone?.due_on;
            if (!dueDate) {
              console.log("No milestone due date found.");
              return;
            }

            const projectId = "PVT_kwHOCYtXtc4A6Pq7"; // ← 위에서 조회한 값
            const fieldId = "PVTF_lAHOCYtXtc4A6Pq7zgu5dVo"; // ← "Target" 필드 ID

            // Fetch project items
            const query = `
              query {
                repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                  issue(number: ${issue_number}) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          id
                        }
                      }
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query);
            const projectItems = result.repository.issue.projectItems.nodes;
            const item = projectItems.find(i => i.project.id === projectId);
            if (!item) {
              console.log("Issue not found in the project.");
              return;
            }

            // Update project field
            const mutation = `
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "${projectId}",
                  itemId: "${item.id}",
                  fieldId: "${fieldId}",
                  value: {
                    date: "${dueDate}"
                  }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;
            await github.graphql(mutation);
